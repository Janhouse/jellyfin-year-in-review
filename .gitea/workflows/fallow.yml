name: Fallow
run-name: ${{ gitea.actor }} is running fallow checks 🌱
on:
  push:
    branches: [main]
  pull_request:

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR audits can diff against the base branch.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install fallow
        run: npm install -g fallow

      # On pull requests, audit changed files against the base branch.
      # Report-only (|| true): the repo may carry an existing baseline that a
      # hard gate would trip over. Switch to --fail-on-issues to enforce.
      - name: Fallow audit (PR diff)
        if: ${{ gitea.event_name == 'pull_request' }}
        run: fallow audit --base origin/${{ gitea.event.pull_request.base.ref }} --ci || true

      # On pushes to the default branch, run the full analysis as a report.
      - name: Fallow report (full)
        if: ${{ gitea.event_name == 'push' }}
        run: fallow --ci || true
