services:
  jellyfin-year-in-review:
    image: ${DOCKER_IMAGE:-jellyfin-year-in-review}
    build:
      dockerfile: ./Dockerfile
      # No build args needed - NEXT_PUBLIC_* placeholders are auto-generated
      # from source code scan during build. Runtime values are injected
      # at container startup via entrypoint.sh
    restart: "unless-stopped"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ./db:/app/db:ro
    ports:
      - "3000:3000"
